name: Build-Action  # When pushing to any branch then run this action
# Env variable
env:
  DESCRIPTION: "Keepalived image based on Alpine Linux"
  KEEPALIVED_VERSION: 2.3.4
  ALPINE_VERSION: 3.23

on:
  workflow_dispatch:
  push:
    branches:
    - '*'
  schedule:
    - cron: "0 0 1 * *"

jobs: # job name
  build-deploy: 
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)
    steps:
      - uses: actions/checkout@v6 # first action : checkout source code
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: dockerhub login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: ghcr login
        uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: |
            ${{ vars.REPO_NAME }}:latest
            ${{ vars.REPO_NAME }}:${{ env.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          platforms: |
            linux/arm/v7
            linux/arm64
            linux/amd64
          labels: |
            MAINTAINER="Marcello Percoco <114474556+MarcelloPercoco@users.noreply.github.com>"
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=${{ env.DESCRIPTION }}
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            KEEPALIVED_VERSION=${{ env.KEEPALIVED_VERSION }}
          push: true
          sbom: false
          provenance: false
          outputs: |
            type=image
            name=target
            annotation-index.org.opencontainers.image.description=${{ env.DESCRIPTION }}

  cleanup:
      needs: build-deploy
      runs-on: ubuntu-latest
      permissions:
        packages: write
        contents: read
      steps:
        - name: Delete old container versions
          uses: actions/delete-package-versions@v5
          with:
            # Utilizza il nome della repository corrente in automatico
            package-name: ${{ github.event.repository.name }}
            package-type: 'container'
            # REGOLA D'ORO: Cancella le versioni più vecchie di 30 giorni
            older-than-number-of-days: 30
            # Mantieni comunque un minimo di versioni per sicurezza (es. 10 per coprire i vari digest multi-arch)
            min-versions-to-keep: 10
            # Non toccare mai il tag latest
            ignore-versions: 'latest'

  update-dockerhub-description:
    needs: build-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.REPO_NAME }}
          readme-filepath: ./Readme.md
