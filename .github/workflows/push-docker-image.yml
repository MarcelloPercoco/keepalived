name: Build-Action  # When pushing to any branch then run this action
# Env variable
env:
  KEEPALIVED_VERSION: 2.3.3
  ALPINE_VERSION: 3.20
  DESCRIPTION: "Keepalived image based on Alpine Linux"

on:
  workflow_dispatch:
  push:
    branches:
    - '*'
  schedule:
    - cron: "0 0 1 * *"

jobs: # job name
  build-deploy: 
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)
    steps:
      - uses: actions/checkout@v4 # first action : checkout source code
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: ghcr login
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: |
            ${{ vars.REPO_NAME }}:latest
            ${{ vars.REPO_NAME }}:${{ env.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            KEEPALIVED_VERSION=${{ env.KEEPALIVED_VERSION }}
            ALPINE_VERSION: ${{ env.ALPINE_VERSION }}
          platforms: |
            linux/arm/v7
            linux/arm64
            linux/amd64
          labels: |
            MAINTAINER="Marcello Percoco <114474556+MarcelloPercoco@users.noreply.github.com>"
            org.opencontainers.image.source=https://github.com/MarcelloPercoco/alpine-keepalived
            org.opencontainers.image.description=${{ env.DESCRIPTION }}
          push: true
          sbom: true
          provenance: mode=max
          outputs: |
            type=image
            name=target
            annotation-index.org.opencontainers.image.description=${{ env.DESCRIPTION }}
