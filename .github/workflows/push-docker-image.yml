name: Build-Action  # When pushing to any branch then run this action
# Env variable
env:
  DESCRIPTION: "Keepalived image based on Alpine Linux"

on:
  workflow_dispatch:
  push:
    branches:
    - '*'
  schedule:
    - cron: "0 0 1 * *"

jobs: # job name
  build-deploy: 
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)
    steps:
      - uses: actions/checkout@v5 # first action : checkout source code
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: ghcr login
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: |
            ${{ vars.REPO_NAME }}:latest
            ${{ vars.REPO_NAME }}:${{ vars.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ vars.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            KEEPALIVED_VERSION=${{ vars.KEEPALIVED_VERSION }}
            ALPINE_VERSION=${{ vars.ALPINE_VERSION }}
          platforms: |
            linux/arm/v7
            linux/arm64
            linux/amd64
          labels: |
            MAINTAINER="Marcello Percoco <114474556+MarcelloPercoco@users.noreply.github.com>"
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=${{ env.DESCRIPTION }}
          push: true
          sbom: true
          provenance: mode=max
          outputs: |
            type=image
            name=target
            annotation-index.org.opencontainers.image.description=${{ env.DESCRIPTION }}

  cleanup:
    needs: build-deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
  
    steps:
  
      - name: Extract tags and compute deletion list
        id: tags
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          IMAGE="${GITHUB_REPOSITORY#*/}"
  
          # Recupera tutte le versioni del package
          RESP=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/users/${OWNER}/packages/container/${IMAGE}/versions?per_page=100")
  
          # Estrai tutti i tag reali
          ALL_TAGS=$(echo "$RESP" | jq -r '.[].metadata.container.tags[]?' | sort -u)
  
          echo "Tutti i tag trovati:"
          echo "$ALL_TAGS"
  
          # Tieni solo gli ultimi 3
          KEEP=$(echo "$ALL_TAGS" | tail -n 3)
          echo "Tag da tenere:"
          echo "$KEEP"
  
          # Trova tag da eliminare
          DELETE=$(comm -23 <(echo "$ALL_TAGS") <(echo "$KEEP"))
          DELETE_CSV=$(echo "$DELETE" | paste -sd "," -)
  
          echo "Tag da eliminare:"
          echo "$DELETE_CSV"
  
          echo "DELETE_TAGS=$DELETE_CSV" >> $GITHUB_ENV
  
  
      - name: Cleanup GHCR (untagged + delete old tags)
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          dry-run: false
          delete-untagged: true
          delete-tags: ${{ env.DELETE_TAGS }}
