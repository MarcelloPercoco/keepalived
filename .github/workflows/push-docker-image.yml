name: Build-Action  # When pushing to any branch then run this action
# Env variable
env:
  DESCRIPTION: "Keepalived image based on Alpine Linux"

on:
  workflow_dispatch:
  push:
    branches:
    - '*'
  schedule:
    - cron: "0 0 1 * *"

jobs: # job name
  build-deploy: 
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)
    steps:
      - uses: actions/checkout@v5 # first action : checkout source code
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: ghcr login
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: |
            ${{ vars.REPO_NAME }}:latest
            ${{ vars.REPO_NAME }}:${{ vars.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ vars.KEEPALIVED_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            KEEPALIVED_VERSION=${{ vars.KEEPALIVED_VERSION }}
            ALPINE_VERSION=${{ vars.ALPINE_VERSION }}
          platforms: |
            linux/arm/v7
            linux/arm64
            linux/amd64
          labels: |
            MAINTAINER="Marcello Percoco <114474556+MarcelloPercoco@users.noreply.github.com>"
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=${{ env.DESCRIPTION }}
          push: true
          sbom: true
          provenance: mode=max
          outputs: |
            type=image
            name=target
            annotation-index.org.opencontainers.image.description=${{ env.DESCRIPTION }}

  cleanup:
    needs: build-deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
  
    steps:
      - name: Extract tags and compute deletion list
        id: tags
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          IMAGE="${GITHUB_REPOSITORY#*/}"
  
          # Recupera tutte le versioni del package (API GitHub restituisce dalla più recente alla più vecchia)
          RESP=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/users/${OWNER}/packages/container/${IMAGE}/versions?per_page=100")
  
          # Estrai tutti i tag nell'esatto ordine Cronologico decrescente restituito dall'API (dal nuovo al vecchio),
          # rimuoviamo completamente il tag "latest" in modo che non venga MAI preso in considerazione per l'eliminazione,
          # ed eliminiamo eventuali doppioni mantenendo l'ordine originale tramite awk.
          ALL_TAGS=$(echo "$RESP" | jq -r '.[].metadata.container.tags[]?' | grep -v '^latest$' | awk '!seen[$0]++')
          
          echo "Tutti i tag trovati in ordine cronologico (escluso latest):"
          echo "$ALL_TAGS"
  
          # Essendo in ordine decrescente (la 1ª riga è la più recente in assoluto), per tenere i 3 più 'freschi', prendiamo i PRIMI 3.
          KEEP=$(echo "$ALL_TAGS" | head -n 3)
          
          echo "Tag recenti da tenere:"
          echo "$KEEP"
  
          # Trova i tag da eliminare: semplicemente tutto ALL_TAGS escludendo le righe combacianti con KEEP
          # (L'operatore || true previene che lo step github actions fallisca qualora grep non trovi niente da eliminare)
          DELETE=$(echo "$ALL_TAGS" | grep -vFxf <(echo "$KEEP") || true)
          
          # Converti le multi-linee in una stringa separata da virgole (CSV) per action succesiva.
          DELETE_CSV=$(echo -n "$DELETE" | tr '\n' ',' | sed 's/,$//')
  
          echo "Tag da eliminare (CSV):"
          echo "$DELETE_CSV"
  
          # Se in totale abbiamo meno di 4 versioni, non c'è niente da cancellare! Non passiamo la variabile.
          if [ -n "$DELETE_CSV" ]; then
            echo "DELETE_TAGS=$DELETE_CSV" >> $GITHUB_ENV
          else
            echo "Niente da eliminare, mantenendo tutti gli attuali."
          fi