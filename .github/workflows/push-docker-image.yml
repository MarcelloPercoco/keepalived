name: Push-to-build  # When pushing to any branch then run this action
# Env variable
env:
  DOCKER_USER: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
  REPO_NAME: ${{ vars.REPO_NAME }}
  ALPINE_VERSION: ${{ vars.ALPINE_VERSION }}
  KEEPALIVED_VERSION: ${{ vars.KEEPALIVED_VERSION }}

on:
  push:
    branches:
    - '*'

jobs: # job name
  build-deploy:
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)
    steps:
      - uses: actions/checkout@v4 # first action : checkout source code
#      - name: take keepalived version
#        run: |
#          echo "KEEPALIVED_VERSION=$(docker run --rm docker.io/alpine:${ALPINE_VERSION} /bin/sh -c 'apk update -q && apk add keepalived -q && apk info keepalived | head -n 1' | sed -e 's/[^-]*-\(.*\) [^ ]*/\1/' )" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.REPO_NAME }}:${{ env.KEEPALIVED_VERSION }},${{ env.REPO_NAME }}:latest
          build-args: |
		ALPINE_VERSION=${{ env.ALPINE_VERSION }}
		KEEPALIVED_VERSION=${{ env.KEEPALIVED_VERSION }}
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
